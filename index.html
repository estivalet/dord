    <canvas
      id="myCanvas"
      width="800"
      height="600"
      style="border: 1px solid grey; background-color: transparent"

    <script>
      const keys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
        Space: false,
        Digit8: false,
        KeyP: false,
        KeyX: false,
        KeyR: false,
        KeyN: false,
      };

      // Listener para pressionar teclas
      document.addEventListener("keydown", (event) => {
        event.preventDefault();
        if (event.key in keys) {
          keys[event.key] = true;
        } else if (event.code == "Space") {
          // Detecta a Spacebar
          keys.Space = true;
        } else if (event.code == "Digit8") {
          keys.Digit8 = true;
        } else if (event.code == "KeyP") {
          keys.KeyP = true;
        } else if (event.code == "KeyX") {
          keys.KeyX = true;
        } else if (event.code == "KeyR") {
          keys.KeyR = true;
        } else if (event.code == "KeyN") {
          keys.KeyN = true;
        }
      });

      // Listener para soltar teclas
      document.addEventListener("keyup", (event) => {
        event.preventDefault();
        if (event.key in keys) {
          keys[event.key] = false;
        } else if (event.code == "Space") {
          // Detecta a Spacebar
          keys.Space = false;
        } else if (event.code == "Digit8") {
          keys.Digit8 = false;
        } else if (event.code == "KeyP") {
          keys.KeyP = false;
        } else if (event.code == "KeyX") {
          keys.KeyX = false;
        } else if (event.code == "KeyR") {
          keys.KeyR = false;
        } else if (event.code == "KeyN") {
          keys.KeyN = false;
        }
      });

              data[mirrorIndex] = data[index];
              data[mirrorIndex + 1] = data[index + 1];
              data[mirrorIndex + 2] = data[index + 2];

          for (let x = 0; x < MAP_WIDTH; x++) {

            }

        // Draw enemies (and wrap-around copies)

          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {

                enemy[ENEMY_X] + (j - 1) * FRAME_WIDTH,
                enemy[ENEMY_Y] + (i - 1) * FRAME_HEIGHT

              Math.floor(playerY) + (i - 1) * FRAME_HEIGHT

          }

              ] > TILE_LEFT_BRICK &&
                map[Math.floor(((floorY + Math.floor(playerY) + FRAME_HEIGHT) % FRAME_HEIGHT) / 10)][
                  Math.floor(((9 + Math.floor(playerX) + FRAME_WIDTH) % FRAME_WIDTH) / 10)
                ] > TILE_LEFT_BRICK) ||
              insideOfBrick
            ) {
              // if not supported by bricks or moving upwards
              if (k == 1) {
                playerVy += vk * GRAVITY;
                if (playerVy > MAX_VY) {
                  playerVy = MAX_VY;
                } else if (playerVy < -MAX_VY) {
                  playerVy = -MAX_VY;
                }
                playerY += playerVy % 1;
                remainderVy = Math.floor(playerVy - (playerVy % 1));
              } else if (remainderVy > 0) {
                playerY++;
                remainderVy--;
              } else {
                playerY--;
                remainderVy++;
              }
            } else {
              playerVy = 0;
              remainderVy = 0;
              if (keysReleased && keys.KeyX) {
                keysReleased = false;
                playerVy = vk * JUMP_VY;
              }
            }
          }

          playerX = (playerX + FRAME_WIDTH) % FRAME_WIDTH;
          playerY = (playerY + FRAME_HEIGHT) % FRAME_HEIGHT;

          for (let i = 0; i < 2; i++) {
            for (let j = 0; j < 2; j++) {
              const mx = Math.floor(((9 * j + Math.floor(playerX) + FRAME_WIDTH) % FRAME_WIDTH) / 10);
              const my = Math.floor(((9 * i + Math.floor(playerY) + FRAME_HEIGHT) % FRAME_HEIGHT) / 10);
              const z = map[my][mx];

              if (z <= TILE_LEFT_BRICK) {
                if (!insideOfBrick) {
                  // player intersected a brick, revert position
                  playerX = x;
                  playerY = Y;
                  if (k > 0 && vk * playerVy < 0) {
                    playerVy = -playerVy;
                  }
                }
              } else if (z == TILE_DIAMOND) {
                map[my][mx] = TILE_EMPTY;
                diamonds--;
              } else if (z == TILE_SPIKES) {
                resetDelay = 1;
                advanceLevel = 0;
              } else if (z >= TILE_RED_KEY && z <= TILE_BLUE_KEY) {
                map[my][mx] = TILE_EMPTY;
                for (let p = 0; p < MAP_HEIGHT; p++) {
                  for (let q = 0; q < MAP_WIDTH; q++) {
                    if (map[p][q] == z + TILE_RED_BRICK - TILE_RED_KEY) {
                      map[p][q] = TILE_EMPTY;
                    }
                  }
                }
              }
            }
          }
        }

        // update appearing bricks
        for (let i = 0; i < 2; i++) {
          for (let j = 0; j < 2; j++) {
            const p = Math.floor(((9 * j + playerX + FRAME_WIDTH) % FRAME_WIDTH) / 10);
            const q = Math.floor(((9 * i + Math.floor(playerY) + FRAME_HEIGHT) % FRAME_HEIGHT) / 10);

            if (map[q][p] == TILE_APPEARING_BLOCK) {
              let blockUnfound = true;

              for (let y = 0; y < 2; y++) {
                for (let x = 0; x < 2; x++) {
                  const checkP = Math.floor(((9 * x + playerX + FRAME_WIDTH) % FRAME_WIDTH) / 10);
                  const checkQ = Math.floor(((9 * y + Math.floor(playerY) + FRAME_HEIGHT) % FRAME_HEIGHT) / 10);

                  if (p == checkP && q == checkQ) {
                    blockUnfound = false;
                    break;
                  }
                }
              }

              if (blockUnfound) {
                map[q][p] = TILE_BRICK;
              }
            }
          }
        }

        // update enemies
        counter++;
        for (let i = 0; i < enemies.length; i++) {
          const enemy = enemies[i];
          if (
            (counter & 1) == 1 ||
            (enemy[ENEMY_TYPE] == ENEMY_TYPE_BLUE && enemy[ENEMY_Y] == Math.floor(playerY)) ||
            enemy[ENEMY_TYPE] == ENEMY_TYPE_MAGENTA
          ) {
            // move enemies
            if (enemy[ENEMY_TYPE] == ENEMY_TYPE_MAGENTA) {
              // update magenta enemy
              if (enemy[ENEMY_Y] % 10 == 0) {
                if (enemy[ENEMY_V] == 0) {
                  let x = Math.abs(playerX - enemy[ENEMY_X]);
                  if (x % FRAME_WIDTH < 18) {
                    enemy[ENEMY_V] = 1;
                  }
                }
                const x = Math.floor(enemy[ENEMY_X] / 10);
                const y = (Math.floor(enemy[ENEMY_Y] / 10) + enemy[ENEMY_V] + MAP_HEIGHT) % MAP_HEIGHT;
                const z = map[(y + MAP_HEIGHT) % MAP_HEIGHT][x];
                if (z !== TILE_EMPTY && z !== TILE_ANTIGRAVITY && z !== TILE_APPEARING_BLOCK) {
                  enemy[ENEMY_V] = enemy[ENEMY_V] == 1 ? -1 : 0;
                }
              }
              if (enemy[ENEMY_V] == 1 || (counter & 3) == 3) {
                enemy[ENEMY_Y] = (enemy[ENEMY_Y] + enemy[ENEMY_V] + FRAME_HEIGHT) % FRAME_HEIGHT;
              }
            } else if (enemy[ENEMY_TYPE] == ENEMY_TYPE_YELLOW || enemy[ENEMY_TYPE] == ENEMY_TYPE_ORANGE) {
              // update yellow and orange enemies
              const d = enemy[ENEMY_TYPE] == ENEMY_TYPE_ORANGE ? 16 : 8;
              enemy[ENEMY_X] = enemy[ENEMY_CX] + Math.floor(enemy[ENEMY_RADIUS] * Math.cos(enemy[ENEMY_V] / d));
              enemy[ENEMY_Y] = enemy[ENEMY_CY] + Math.floor(enemy[ENEMY_RADIUS] * Math.sin(enemy[ENEMY_V] / d));
              enemy[ENEMY_V]++;
            } else if (enemy[ENEMY_TYPE] == ENEMY_TYPE_SPIKES) {
              // update spikes enemy
              if (enemy[ENEMY_Y] == 0) {
                enemy[ENEMY_V] = 1;
              } else if (enemy[ENEMY_Y] == FRAME_HEIGHT - 10) {
                enemy[ENEMY_V] = -1;
              }
              enemy[ENEMY_Y] += enemy[ENEMY_V];
            } else if (enemy[ENEMY_TYPE] !== ENEMY_TYPE_GREEN) {
              // update red and blue enemies (upside-down ones also)
              if (enemy[ENEMY_X] % 10 == 0) {
                const x = (Math.floor(enemy[ENEMY_X] / 10) + enemy[ENEMY_V] + MAP_WIDTH) % MAP_WIDTH;
                const y = Math.floor(enemy[ENEMY_Y] / 10);
                const i = map[y][x];
                const j =
                  map[(y + (enemy[ENEMY_TYPE] == ENEMY_TYPE_FLIPPED_RED ? -1 : 1) + MAP_HEIGHT) % MAP_HEIGHT][x];
                if (
                  (i !== TILE_EMPTY && i !== TILE_ANTIGRAVITY && i !== TILE_APPEARING_BLOCK) ||
                  j == TILE_EMPTY ||
                  j == TILE_ANTIGRAVITY ||
                  j == TILE_APPEARING_BLOCK
                ) {
                  enemy[ENEMY_V] = -enemy[ENEMY_V];
                }
              }
              enemy[ENEMY_X] = (enemy[ENEMY_X] + enemy[ENEMY_V] + FRAME_WIDTH) % FRAME_WIDTH;
            } else {
              // update green enemy
              if (enemy[ENEMY_Y] % 10 == 0) {
                const x = Math.floor(enemy[ENEMY_X] / 10);
                const y = (Math.floor(enemy[ENEMY_Y] / 10) + enemy[ENEMY_V] + MAP_HEIGHT) % MAP_HEIGHT;
                const z = map[(y + MAP_HEIGHT) % MAP_HEIGHT][x];
                if (z !== TILE_EMPTY && z !== TILE_ANTIGRAVITY && z !== TILE_APPEARING_BLOCK) {
                  enemy[ENEMY_V] = -enemy[ENEMY_V];
                }
              }
              enemy[ENEMY_Y] = (enemy[ENEMY_Y] + enemy[ENEMY_V] + FRAME_HEIGHT) % FRAME_HEIGHT;
            }
          }

          // test if player collides with enemy
          const x = ((playerX + FRAME_WIDTH) % FRAME_WIDTH) - ((enemy[ENEMY_X] + FRAME_WIDTH) % FRAME_WIDTH);
          const y =
            ((Math.floor(playerY) + FRAME_HEIGHT) % FRAME_HEIGHT) - ((enemy[ENEMY_Y] + FRAME_HEIGHT) % FRAME_HEIGHT);

          if (x <= 9 && x >= -9 && y <= 9 && y >= -9) {
            // player collides with enemy
            resetDelay = 1;
            advanceLevel = 0;
          }
        }

        if (diamonds == 0) {
          // all diamonds collected, advance to next level
          resetDelay = ADVANCE_LEVEL_DELAY;
          advanceLevel = 1;
        }

        draw();

        // The loop function has reached it's end. Keep requesting new frames
        window.requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
</html>
